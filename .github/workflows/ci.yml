name: Holdfast CI

on:
  push:
    branches: [main]
    paths:
      - "holdfast/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "holdfast/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "2.2.20"
  ANCHOR_VERSION: "0.31.0"
  NODE_VERSION: "20"

jobs:
  build-and-test:
    name: Anchor build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: holdfast

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
          cache-dependency-path: holdfast/yarn.lock

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            holdfast/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('holdfast/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: |
            ~/.avm
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Generate test wallet
        run: solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json

      - name: Install oracle keypair
        env:
          ORACLE_KEYPAIR_JSON: ${{ secrets.ORACLE_KEYPAIR_JSON }}
        run: echo "$ORACLE_KEYPAIR_JSON" > ~/.config/solana/oracle-devnet.json

      - name: Inject program deployment keypairs
        env:
          VAULTPACT_KEYPAIR_JSON: ${{ secrets.VAULTPACT_KEYPAIR_JSON }}
          VAULTPACT_ESCROW_KEYPAIR_JSON: ${{ secrets.VAULTPACT_ESCROW_KEYPAIR_JSON }}
        run: |
          mkdir -p target/deploy
          echo "$VAULTPACT_KEYPAIR_JSON" > target/deploy/vaultpact-keypair.json
          echo "$VAULTPACT_ESCROW_KEYPAIR_JSON" > target/deploy/vaultpact_escrow-keypair.json

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Install oracle dependencies
        run: npm install --prefix oracle --ignore-scripts

      - name: Build programs
        run: anchor build

      - name: Run tests
        run: ORACLE_KEYPAIR_PATH="$HOME/.config/solana/oracle-devnet.json" anchor test

  typecheck:
    name: Typecheck (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        package: [sdk, oracle, indexer]

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: holdfast/${{ matrix.package }}
        run: npm install --ignore-scripts

      - name: Run typecheck
        working-directory: holdfast/${{ matrix.package }}
        run: npm run typecheck
