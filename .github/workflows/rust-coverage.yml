name: Rust Unit Coverage

on:
  push:
    branches: [main]
    paths:
      - "holdfast/programs/**"
      - "holdfast/Cargo.toml"
      - "holdfast/Cargo.lock"
      - "holdfast/tarpaulin.toml"
  pull_request:
    paths:
      - "holdfast/programs/**"
      - "holdfast/Cargo.toml"
      - "holdfast/Cargo.lock"
      - "holdfast/tarpaulin.toml"

jobs:
  rust-coverage:
    name: Rust unit coverage (≥50%)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: holdfast

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('holdfast/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Run Rust unit coverage (≥50% gate)
        run: cargo tarpaulin --config tarpaulin.toml

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-report
          path: holdfast/coverage/
          retention-days: 30
