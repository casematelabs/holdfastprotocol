app = "holdfast-indexer"
primary_region = "ord"

[build]

[env]
  PORT = "3001"
  DB_PATH = "/data/reputation.db"
  SOLANA_RPC_URL = "https://api.devnet.solana.com"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "vaultpact_indexer_data"
  destination = "/data"
  initial_size = "1gb"
