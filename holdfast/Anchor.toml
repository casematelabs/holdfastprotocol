[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
vaultpact = "D6mUa4wGtFyLyJorMfxoKvA9ybohjUSsfw88t66ATxg"
vaultpact_escrow = "BNxA76z6vjQYtUJXGpH8qjA3wHvtAAqGqL6rvVWH6b3H"

[programs.devnet]
vaultpact = "D6mUa4wGtFyLyJorMfxoKvA9ybohjUSsfw88t66ATxg"
vaultpact_escrow = "BNxA76z6vjQYtUJXGpH8qjA3wHvtAAqGqL6rvVWH6b3H"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[test]
# Increased from 60000 to accommodate Windows/slow-start environments
startup_wait = 120000

# SIMD-48: secp256r1 precompile — required for register_agent_wallet, rotate_agent_key,
# close_agent_wallet, and test_verify_webauthn tests that submit Secp256r1Program instructions.
# Activated on devnet/mainnet with Agave 2.0+; must be explicitly enabled on localnet.
[[test.validator.features]]
address = "BrTa4mt2gLCRdKoTHEkYBcmfTNNBDxJ69DFyzxcJLJTv"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
