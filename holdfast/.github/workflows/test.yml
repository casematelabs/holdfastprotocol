name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "3.1.12"
  ANCHOR_VERSION: "0.31.0"

jobs:
  test:
    name: Anchor Integration Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock', 'programs/**/*.rs') }}
          restore-keys: ${{ runner.os }}-target-

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI (Agave ${{ env.SOLANA_VERSION }})
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Anchor/AVM
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
            ~/.avm
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install AVM and Anchor ${{ env.ANCHOR_VERSION }}
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Activate Anchor ${{ env.ANCHOR_VERSION }}
        if: steps.cache-anchor.outputs.cache-hit == 'true'
        run: avm use ${{ env.ANCHOR_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/cache
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install test dependencies
        run: yarn install --frozen-lockfile

      - name: Cache oracle npm dependencies
        uses: actions/cache@v4
        with:
          path: oracle/node_modules
          key: ${{ runner.os }}-oracle-${{ hashFiles('oracle/package-lock.json') }}
          restore-keys: ${{ runner.os }}-oracle-

      - name: Install oracle dependencies
        run: npm install
        working-directory: oracle

      - name: Generate ephemeral test wallet
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/devnet.json

      - name: Build programs
        run: anchor build

      - name: Run integration tests
        run: anchor test --skip-build
