<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Holdfast Protocol — OG Image 1200×630</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; background: #0D1117; }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      background: #0D1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    /* Subtle grid texture */
    .og::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(45, 140, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 140, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Blue glow behind center */
    .og::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(45, 140, 255, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Top border accent */
    .og-top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, #2D8CFF 30%, #2D8CFF 70%, transparent 100%);
    }

    /* Main content */
    .og-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Shield mark */
    .og-shield {
      width: 96px;
      height: 96px;
      margin-bottom: 32px;
    }

    /* Protocol name */
    .og-name {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      color: #E8EDF2;
      margin-bottom: 8px;
    }

    .og-name span {
      color: #2D8CFF;
    }

    /* Tagline */
    .og-tagline {
      font-size: 22px;
      font-weight: 400;
      color: #8A99AC;
      letter-spacing: -0.01em;
      text-align: center;
      max-width: 700px;
      line-height: 1.4;
      margin-top: 16px;
    }

    /* Divider */
    .og-divider {
      width: 48px;
      height: 2px;
      background: #1E2D42;
      margin: 28px auto 0;
    }

    /* Bottom bar */
    .og-bottom {
      position: absolute;
      bottom: 36px;
      left: 48px;
      right: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .og-domain {
      font-size: 16px;
      font-weight: 500;
      color: #4D5E72;
      letter-spacing: 0.02em;
      font-family: 'Courier New', Courier, monospace;
    }

    .og-parent {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #4D5E72;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .og-parent-sep {
      width: 1px;
      height: 14px;
      background: #1E2D42;
    }

    /* Tag pills */
    .og-tags {
      display: flex;
      gap: 10px;
      margin-top: 28px;
    }

    .og-tag {
      padding: 5px 12px;
      border: 1px solid #1E2D42;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      color: #4D5E72;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="og-top-bar"></div>

    <div class="og-content">
      <!-- Shield mark (96px) -->
      <svg class="og-shield" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer glow -->
        <circle cx="48" cy="48" r="48" fill="rgba(45,140,255,0.06)"/>
        <!-- Shield fill -->
        <path d="M48 8L12 20V44C12 64 28 80 48 88C68 80 84 64 84 44V20L48 8Z" fill="rgba(45,140,255,0.12)" stroke="#2D8CFF" stroke-width="2.5"/>
        <!-- Lock shackle -->
        <path d="M38 54V44A10 10 0 0 1 58 44V54" stroke="#2D8CFF" stroke-width="3.5" fill="none" stroke-linecap="square"/>
        <!-- Lock body -->
        <rect x="33" y="54" width="30" height="22" rx="3" stroke="#2D8CFF" stroke-width="2.5" fill="rgba(45,140,255,0.08)"/>
        <!-- Keyhole -->
        <circle cx="48" cy="65" r="4" fill="#2D8CFF"/>
      </svg>

      <!-- Protocol name -->
      <div class="og-name">
        <span>Hold</span>fast Protocol
      </div>

      <!-- Tagline -->
      <div class="og-tagline">
        Trust infrastructure for the autonomous agent economy
      </div>

      <!-- Tag pills -->
      <div class="og-tags">
        <div class="og-tag">Hardware Attestation</div>
        <div class="og-tag">Programmable Escrow</div>
        <div class="og-tag">On-Chain Reputation</div>
        <div class="og-tag">Solana</div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="og-bottom">
      <div class="og-domain">holdfastprotocol.com</div>
      <div class="og-parent">
        <div class="og-parent-sep"></div>
        A Casemate Labs Protocol
      </div>
    </div>
  </div>
</body>
</html>
